name: Test

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    # At minute 0 past hour 6. (see https://crontab.guru)
    - cron: "00 06 * * *"

concurrency:
  # A PR number if a pull request, otherwise the commit hash. This
  # cancels queued and in-progress runs for the same PR (presubmit) or
  # commit (postsubmit).
  group: ci-${{ github.event.number || github.sha }}
  cancel-in-progress: true

jobs:
  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}

    permissions:
      # Required by magic-nix-cache-action to talk to the GitHub
      # Actions cache service.
      id-token: write
      contents: read

    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-22.04
          - macos-15

    defaults:
      run:
        # Run every step inside the project's CI nix shell — the
        # minimum env needed to configure and run `check-all`. No
        # Rust, Racket, or Herbie graphics deps.
        shell: nix develop .#ci --command bash -e {0}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main

      - name: Magic Nix Cache
        uses: DeterminateSystems/magic-nix-cache-action@main
        with:
          use-flakehub: false

      - name: Configure
        run: tamagoyaki-configure build

      - name: Build and test (check-all)
        run: ninja -C build check-all

      - name: Upload ExternalProject logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: externalproject-logs-${{ matrix.os }}
          path: |
            build/herbie_mlir/rival/deps-build/**/src/*-stamp/*.log
